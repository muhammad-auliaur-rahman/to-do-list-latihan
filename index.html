<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" />
    <title>To Do List</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="container-profil">
          <img src="img/profil.png" id="avatar" alt="foto-profil" />
          <div class="profil">
            <h3 id="nama">Muhammad Auliaur Rahman</h3>
            <span id="pekerjaan">Student in Harisenin.com</span>
          </div>

          <div class="container-data-profil" id="from-profil">
            <button id="close-jendela">Close</button>
            <h3>Masukkan Profil Kamu</h3>
            <form action="#" class="form-input-profil">
              <label for="input-nama">Siapa Nama Kamu </label>
              <input
                type="text"
                name="nama"
                id="input-nama"
                placeholder="Masukkan Nama kamu"
                required
              />

              <label for="input-pekerjaan">Apa pekerjaan kamu</label>
              <input
                type="text"
                name="pekerjaan"
                id="input-pekerjaan"
                placeholder="Masukkan nama pekerjaan mu"
                required
              />

              <label for="link-foto">Masukkan link foto kamu</label>
              <input
                type="text"
                name="link"
                id="link-foto"
                placeholder="Masukkan Link foto kamu dari drive"
              />

              <button type="button" id="btn-simpan">Simpan Data</button>
            </form>
          </div>
        </div>

        <div class="btn-profil"><button id="btn-edit">Edit</button></div>
      </header>

      <main>
        <div class="display-date">
          <h3 id="date">Tanggal Hari ini</h3>
        </div>
        <div class="blok-main">
          <h3>Tulis Tugas Baru</h3>
          <textarea
            name="task"
            id="task-input"
            placeholder="Tulis Tugas Kamu disini..."
          ></textarea>
        </div>
        <div class="blok-main">
          <h3>Atur Tanggal</h3>
          <input type="date" id="task-deadline" class="date-input" />
        </div>

        <div class="blok-main">
          <h3>Level Prioritas</h3>
          <div class="bungkus-btn">
            <button class="btn-prio active" data-prio="Low">Low</button>
            <button class="btn-prio" data-prio="Medium">Medium</button>
            <button class="btn-prio" data-prio="High">High</button>
          </div>
        </div>

        <button class="btn-submit" id="submit-task">Submit Agenda</button>
      </main>

      <section class="kolom-bawah">
        <div class="section-judul">
          <h3>🕒 Kolom To Do</h3>
        </div>
        <div class="task-list" id="todo-column"></div>

        <div class="section-judul">
          <h3>✅ Kolom Done</h3>
        </div>
        <div class="task-list" id="done-column"></div>

        <div class="btn-hapus">
          <button class="clear-btn" id="clear-all-btn">
            🗑️ Button Delete All
          </button>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
